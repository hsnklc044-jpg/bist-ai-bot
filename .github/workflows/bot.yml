name: BIST AI SYSTEM

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphaneleri kur
        run: |
          pip install -r requirements.txt

      - name: Bot çalıştır
        run: |
          python system_launcher.py
